- type: entity
  name: шоколадная пицца
  parent: FoodPizzaBase
  id: FoodPizzaChocolate
  description: Блюдо для тех, кто не может выбрать между шоколадом и пиццей.
  components:
  - type: FlavorProfile
    flavors:
    - bread
    - sweet
    - chocolate
  - type: Sprite
    sprite: _Adventure/Objects/Food/pizza.rsi
    layers:
    - state: chocolate
  - type: SliceableFood
    slice: FoodPizzaChocolateSlice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 50
        reagents:
        - ReagentId: Nutriment
          Quantity: 30
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: Theobromine
          Quantity: 10
        - ReagentId: CocoaPowder
          Quantity: 5
  - type: Tag
    tags:
    - Pizza

- type: entity
  name: кусок шоколадной пиццы
  parent: FoodPizzaSliceBase
  id: FoodPizzaChocolateSlice
  description: Мечта сладкоежек. А не слипнется?
  components:
  - type: FlavorProfile
    flavors:
    - bread
    - sweet
    - chocolate
  - type: Sprite
    sprite: _Adventure/Objects/Food/pizza.rsi
    layers:
    - state: chocolate-slice
  - type: Item
    heldPrefix: chocolate-slice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Vitamin
          Quantity: 0.8
        - ReagentId: Theobromine
          Quantity: 2
        - ReagentId: CocoaPowder
          Quantity: 0.8
  - type: Tag
    tags:
    - Pizza
    - Slice

