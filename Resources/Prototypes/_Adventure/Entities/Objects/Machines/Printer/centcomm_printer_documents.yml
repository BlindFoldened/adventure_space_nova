             [bold][color=#006400]Положения вызова эвакуационного шаттла[/color][/bold]:
             • Цель выполнена и отчёт принят ЦентКомом.
             • Цель провалена и отчёт принят ЦентКомом.
             • Два несанкционированных вызова шаттла со стороны станции, при обоих вызовах нет реакции на сообщение ЦК/Нет отчётов.
             • Эвакуация вместе с ОБР/РХБЗЗ.

             [bold][color=#006400]Положения ответа на факсы[/color][/bold]:
             • Документы глав станции принимаются только с печатью членов командования. В этот список входят: Отчёты по цели, отчёты по ситуации на станции, запросы о назначении ВрИО капитана, запросы на вызов членов ЦК, запрос на увольнение/повышение, запрос на выдачу премии.
             [italic]Напоминание: Офицер Синего Щита не является членом командования.[/italic]
             • Документы Юридического Департамента принимаются только с печатью АВД, Юриста и членов командования.
             [italic]Исключение: жалобы от экипажа могут быть без печатей командования, если жалобы идут непосредственно на работу командования станцией.[/italic]
             • Отчёты о казни принимаются только с печатью Капитана, Смотрителя или Главы Службы Безопасности.
             [italic]Если казнь прошла с нарушением процедуры казни, то ответственное лицо должно получить штраф и должностной выговор.[/italic]
             • Специальные (особые) заказы от станции ЦентКому должны быть исключительно с печатью командования станции.
             • В случае допуска ошибок в документе, ответственному лицо может быть выписан штраф.
             На документы не по форме, но с печатью глав, вы должны отказывать, а так же можете выдавать штраф ответственному лицу.
             • Вы можете игнорировать документы без печатей и без формы, за исключением запросов на вызов сил ДепСО и жалоб экипажа на командный состав.
             • На каждый документ, на который вы дали ответ должна стоять печать ЦентКома, а так-же, при необходимости, печать [bold][color=#006400]"ОДОБРЕНО"[/color][/bold] или [bold][color=#9a0323]"ОТКАЗАНО"[/color][/bold].

             [bold][color=#006400]Ситуации, оправдывающие Гамма код[/color][/bold]:
             • Объявление о начале войны враждебными корпорациями.
             • Боевые мятежи на станции.
             • Высокая угроза существованию станции из-за вражеской активности/фауны/биологической угрозы.
             • Иные ситуации, классифицируемые как "Военное положение".

             [bold][color=#006400]Ситуации, оправдывающие Дельта код[/color][/bold]:
             • Отчёт о ситуации, в котором сообщение о нарушении условий содержания Шара Теслы.
             • Побег Сверхмассивной Сингулярности, которая уничтожила 1/3 и более станции.
             • Механизм самоуничтожения станции взведён.

             [bold][color=#006400]Ситуации, оправдывающие вызов ЦСС[/color][/bold]:
              Сопровождение сотрудников ЦК на станции.
             • Проведение расследования на станции в случае отсутствия отчёта о ситуации на станции и подозрении на наличие угрозы.
             • Отсутствие или некомпетентность Службы Безопасности при наличии подтверждённой угрозы на станции, не требующей вмешательства ОБР или РХБЗЗ.

             [bold][color=#006400]Ситуации, оправдывающие вызов ОБР[/color][/bold]:
             • Командование станции заявляет о потере контроля над станцией, вооруженный мятеж экипажа.
             • Вторжение мародёров Горлекса на станцию.
             • Служба безопасности не справляется с многочисленными угрозами на станции, высокая смертность среди экипажа.

             [bold][color=#006400]Ситуации, оправдывающие вызов РХБЗЗ[/color][/bold]:
             • На станции действует биологическая угроза 6-3 уровня, содержание которой невозможно сотрудниками Службы Безопасности.

             [bold][color=#006400]Ситуации, оправдывающие отправку кодов ядерной аутентификации[/color][/bold]:
             • На станции действует биологическая угроза 3-1 уровня, содержание которой невозможно отрядом РХБЗЗ.

