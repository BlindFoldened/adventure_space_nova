             Цель вашей смены - строительство [bold]станционной бани[/bold] для улучшения качества рекреации персонала станции в районе жилых отсеков.
             • [bold][color=#efb341]Инженерному отделу[/color][/bold] необходимо построить станционную баню и оснастить её системой подачи водяного пара и системой контроля температуры. Для строительства внешних стен рекомендуется использовать укреплённые материалы. Баня должна быть оснащена [bold]банной комнатой[/bold] с вениками, резервуарами с водой, печью и [bold]комнатой отдыха[/bold] с сидячими и лежачими местами и холодильником для напитков.
             • [bold][color=#d381c9]Отделу РНД[/color][/bold] необходимо создать нужные платы, выполнять заказы инженерного отдела в первую очередь.
             • [bold][color=#9fed58]Сервисному отделу[/color][/bold] необходимо приготовить освежающие напитки для комнаты отдыха станционной бани.
             • [bold][color=#52b4e9]Медицинскому отделу[/color][/bold] необходимо снабдить аптечку в комнате отдыха специальными лекарствами для первой помощи при отравлении и термических повреждениях.
             [italic]По окончании строительства станционной бани и отправки отчёта о выполнении цели, Центком может прислать своего представителя для проверки качества выполнения цели и последующего использования станционной бани.[/italic]
