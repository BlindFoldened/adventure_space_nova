             [bold][color=#006400]Центральное Командование (ЦК или ЦентКом)[/color][/bold]
             Осуществляет управление всеми станциями сектора и отвечает непосредственно перед Советом Директоров Корпорации.

             [bold][color=#006400]Станция Центрального Командования (СЦК)[/color][/bold]
             Станция, на которой находится смена Центрального Командования.

             [bold][color=#006400]Оператор Центрального Командования (ОЦК)[/color][/bold]
             Связующее звено между Секторальным ЦК и станциями в Секторе. Задача ОЦК — осуществлять оперативный контроль и связь над станциями сектора.

             [bold][color=#006400]Представитель Центрального Командования (ПЦК)[/color][/bold]
             Лицо, представляющее интересы NanoTrasen на станции и  присылаемое на станцию для разрешения конфликтов и спорных ситуаций в том случае, если командование станции неспособно решить их самостоятельно.

             [bold][color=#006400]Начальник Штаба Центрального Командования (НШЦК)[/color][/bold]
             Непосредственный глава Секторального Штаба ЦентКома, возглавляет СЦК Сектора. Ему подчиняется весь экипаж СЦК.

             [bold][color=#b26800]Офицер Специальных Операций (ОСО)[/color][/bold]
             Возглавляет Секториальный Отдел Департамента Специальных Операций и руководит боевыми группировками, защищающие сектор от нападения. В случае ЧС на СЦК именно он отвечает за защиту СЦК от нападения.

