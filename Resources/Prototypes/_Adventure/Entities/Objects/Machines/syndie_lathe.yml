- type: entity
  id: SyndicateTechFabCircuitboard
  parent: BaseMachineCircuitboard
  name: Техфаб Синдиката (машинная плата)
  description: Печатная плата техфаба Синдиката.
  components:
    - type: MachineBoard
      prototype: SyndicateTechFab
      stackRequirements:
        Manipulator: 4
        Glass: 1

- type: entity
  id: SyndicateTechFab
  parent: BaseLatheLube
  name: Техфаб Синдиката
  description: Хранит библиотеку нелегальных технологий и некоторые базовые вещи. Имеет возможность обрабатывать нечестно полученные чертежи для печати по новым рецептам.
  components:
  - type: Sprite
    sprite: _Adventure/Objects/Machines/syndie_techfab.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: plating
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Machine
    board: SyndicateTechFabCircuitboard
  - type: MaterialStorage
    whitelist:
      tags:
        - Sheet
        - RawMaterial
        - Ingot
  - type: OreSiloClient
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - TaipanStatic
  - type: EmagLatheRecipes
    emagStaticPacks:
    - SecurityAmmoStatic
    - SyndicateAmmoStatic
  - type: BlueprintReceiver
    whitelist:
      tags:
      - BlueprintSyndielathe
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      blueprint: !type:Container
  - type: EmptyOnMachineDeconstruct
    containers:
    - blueprint

