- type: reagent
  id: StationBlessing
  name: благословение станции
  parent: BaseAlcohol
  desc: Смесь нескольких напитков. Окрыляет.
  physicalDesc: reagent-physical-desc-holy
  flavor: stationblessing
  color: "#ffec3d"
  metamorphicSprite:
    sprite: _Adventure/Objects/Consumable/Drinks/stationblessingglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 0.75
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.4
      - !type:HealthChange
        damage:
          types:
            Heat: -0.5
            Shock: -0.5
            Cold: -1
            Caustic: -0.5
            Blunt: -0.75
            Slash: -0.5
            Piercing: -0.5
            Asphyxiation: -1
            Bloodloss: -0.5
            Poison: -1
            Radiation: -0.5
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: StationBlessing
          min: 30.5
        damage:
          types:
            Asphyxiation: 3
            Caustic: 1
            Poison: 3

