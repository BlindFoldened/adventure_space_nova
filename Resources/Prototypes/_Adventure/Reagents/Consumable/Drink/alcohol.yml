- type: reagent
  id: EngFuel
  name: топливо инженерии
  parent: BaseAlcohol
  desc: Все стереотипы в одном напитке. Этот посвящен инженерному отделу.
  physicalDesc: reagent-physical-desc-electric
  flavor: jobfueleng
  color: "#00d9ff"
  metamorphicSprite:
    sprite: _Adventure/Objects/Consumable/Drinks/engfuelglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 4
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Drink:
      effects:
      - !type:SatiateThirst
        factor: 1
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 0.25

