        hand:
          emptyLabel: borg-slot-chemical-containers-empty
          emptyRepresentative: Jug
          whitelist:
            components:
            - FitsInDispenser
            tags:
            - ChemDispensable
      - item: Jug
        hand:
          emptyLabel: borg-slot-chemical-containers-empty
          emptyRepresentative: Jug
          whitelist:
            components:
            - FitsInDispenser
            tags:
            - ChemDispensable
      - item: Jug
        hand:
          emptyLabel: borg-slot-chemical-containers-empty
          emptyRepresentative: Jug
          whitelist:
            components:
            - FitsInDispenser
            tags:
            - ChemDispensable
      - item: Jug
        hand:
          emptyLabel: borg-slot-chemical-containers-empty
          emptyRepresentative: Jug
          whitelist:
            components:
            - FitsInDispenser
            tags:
            - ChemDispensable
      - item: LargeBeaker
        hand:
          emptyLabel: borg-slot-chemical-containers-empty
