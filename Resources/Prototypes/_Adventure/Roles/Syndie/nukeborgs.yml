- type: entity
  id: RPDRecharging
  parent: RPD
  name: экспериментальное УПТ
  description: Новейшее ручное устройство подачи труб, которое может быстро размещать трубы и вентиляции.
  suffix: AutoRecharge
  components:
  - type: LimitedCharges
    maxCharges: 20
  - type: AutoRecharge
    rechargeDuration: 10

- type: entity
  id: Disassembler
  parent: RCD
  name: дизассемблер
  description: Отмычка, специально сконструированная для разбора укрепленных стен.
  components:
   - type: RCD
     deviceType: Disassembler
     availablePrototypes:
     - Deconstruct
   - type: Sprite
     sprite: _Adventure/Interface/Actions/actions_borg_syndie.rsi
     state: icon
   - type: LimitedCharges
     maxCharges: 20
   - type: AutoRecharge
     rechargeDuration: 10

